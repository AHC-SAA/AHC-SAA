<section class="formcarry-container">
  <form action="https://formcarry.com/s/nZ6OcDyb0dR" method="POST" enctype="multipart/form-data">
    
    <div class="formcarry-block">
      <label for="username">Discord Username</label>
      <input type="text" name="username" id="username" placeholder="username#0000" />
    </div>
  	
    <div class="formcarry-block">
      <label for="date">Preferred Date (UTC)</label>
      <input type="date" name="date" id="date" />
    </div>
  	
    <div class="formcarry-block">
      <label for="time">Preferred Time (UTC)</label>
      <input type="time" name="time" id="time" />
    </div>

    <div class="formcarry-block">
      <label for="message">Reason of Appointment</label>
      <textarea name="message" id="message" placeholder="Explain your request..."></textarea>
    </div>
  	
    <div class="formcarry-block">  
      <button type="submit">Send Request</button>
    </div>
  
  </form>
</section>
